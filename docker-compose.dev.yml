services:
  db:
    image: postgres:15-alpine
    container_name: hibinka-db-dev
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hibinka_db_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hibinka-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hibinka-backend-dev
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      POSTGRES_SERVER: db
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    networks:
      - hibinka-dev

  landing:
    image: node:20-slim
    container_name: hibinka-landing-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/landing:/app
      - landing_node_modules:/app/node_modules
    networks:
      - hibinka-dev
    depends_on:
      - backend

volumes:
  postgres_data_dev:
  landing_node_modules:

networks:
  hibinka-dev:
    driver: bridge
