services:
  db:
    image: postgres:15-alpine
    container_name: hibinka-db-dev
    restart: always
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hibinka_db_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hibinka_db_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hibinka-dev

  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: hibinka-workspace
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-hibinka_db_dev}
    volumes:
      - .:/workspace:cached
      - landing_node_modules:/workspace/frontend/landing/node_modules
      - dashboard_node_modules:/workspace/frontend/dashboard/node_modules
      - shared_node_modules:/workspace/frontend/shared/node_modules
      - venv_data:/workspace/.venv
    ports:
      - "8000:8000" # FastAPI
      - "5173:5173" # Landing
      - "5174:5174" # Shared
      - "5175:5175" # Dashboard
    networks:
      - hibinka-dev
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_dev:
  landing_node_modules:
  dashboard_node_modules:
  shared_node_modules:
  venv_data:

networks:
  hibinka-dev:
    driver: bridge
