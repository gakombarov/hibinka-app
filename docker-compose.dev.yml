services:
  db:
    image: postgres:15-alpine
    container_name: hibinka-db-dev
    restart: always
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hibinka_db_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hibinka_db_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hibinka-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hibinka-backend-dev
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-hibinka_db_dev}
      POSTGRES_SERVER: db
      POSTGRES_HOST: db
      DB_HOST: db
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - hibinka-dev

  landing:
    image: node:20-slim
    container_name: hibinka-landing-dev
    working_dir: /app
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/landing:/app
    networks:
      - hibinka-dev
    depends_on:
      - backend

  shared:
    image: node:20-slim
    container_name: hibinka-shared-dev
    working_dir: /app
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/shared:/app
    networks:
      - hibinka-dev
    depends_on:
      - backend

volumes:
  postgres_data_dev:

networks:
  hibinka-dev:
    driver: bridge
