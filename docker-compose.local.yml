services:
  db:
    image: postgres:15-alpine
    container_name: hibinka-db-local
    restart: always
    env_file: .env
    ports:
      - "5445:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./hibinka51-server
      dockerfile: Dockerfile.dev
    container_name: hibinka-server-local
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./hibinka51-server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  client:
    build:
      context: ./hibinka51-client
      dockerfile: Dockerfile.dev
    container_name: hibinka-client-local
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./hibinka51-client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

volumes:
  pg_data_local: