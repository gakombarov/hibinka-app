name: Deploy to Production VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            # 1. Переходим в папку с проектом
            cd hibinka-app

            # 2. Скачиваем последние изменения из репозитория
            git pull origin main

            # 3. Пересобираем и перезапускаем контейнеры в фоновом режиме
            docker-compose -f docker-compose.prod.yml up -d --build

            # 4. Clean Code для сервера: удаляем старые образы (dangling images)
            docker image prune -f
